<script type="text/javascript">//<![CDATA[
XHR.poll(5, '<%=url([[admin]], [[services]], [[bafa]], [[bafa_status]])%>', null,
    function(x, data) {
        var status = document.getElementById('bafa_status');
        if (data && status) {
            if (data.running) {
                status.innerHTML = "<em><b style='color:green;'>巴法云 正在运行</b></em>";
            } else {
                status.innerHTML = "<em><b style='color:red;'>巴法云 未运行</b></em>";
            }
        }
    }
);
//]]>
</script>
<fieldset class="cbi-section">
    <p id="bafa_status">
        <em>收集数据...</em>
    </p>
</fieldset>
