<script type="text/javascript">//<![CDATA[
XHR.poll(5, '<%=url([[admin]], [[services]], [[ntwon]], [[ntwon_status]])%>', null,
    function(x, data) {
        var status = document.getElementById('ntwon_status');
        if (data && status) {
            if (data.running) {
                status.innerHTML = "<em><b style='color:green;'>NTWON 组网 <%:RUNNING%></b></em>";
            } else {
                status.innerHTML = "<em><b style='color:red;'>NTWON 组网 <%:NOT RUNNING%></b></em>";
            }
        }
    }
);
//]]>
</script>
<fieldset class="cbi-section">
    <p id="ntwon_status">
        <em><%:Collecting data...%></em>
    </p>
</fieldset>
